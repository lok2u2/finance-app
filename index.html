<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>高级理财管理系统</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
    }

    .login-page{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
        radial-gradient(circle at top right,#2563eb33,transparent 40%),
        radial-gradient(circle at bottom left,#7c3aed33,transparent 40%),
        #0f172a;
    }

    .glass{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:24px;
      box-shadow:0 10px 40px rgba(0,0,0,0.3);
    }

    .login-box{
      width:380px;
      padding:40px;
    }

    .login-box h1{
      font-size:30px;
      margin-bottom:10px;
    }

    .login-box p{
      color:#cbd5e1;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:14px;
      margin-top:8px;
      margin-bottom:18px;
      background:rgba(255,255,255,0.08);
      color:white;
      font-size:14px;
    }

    input::placeholder{
      color:#94a3b8;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:white;
      font-size:15px;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
    }

    button:hover{
      transform:translateY(-2px);
      opacity:0.95;
    }

    .hidden{
      display:none;
    }

    .container{
      padding:30px;
      max-width:1500px;
      margin:auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
      flex-wrap:wrap;
      gap:10px;
    }

    .topbar h1{
      font-size:32px;
    }

    .logout{
      width:auto;
      padding:12px 20px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .stat-card{
      padding:24px;
      border-radius:22px;
    }

    .stat-card h3{
      color:#cbd5e1;
      font-size:14px;
      margin-bottom:10px;
    }

    .stat-card p{
      font-size:32px;
      font-weight:bold;
    }

    .layout{
      display:grid;
      grid-template-columns:1.1fr 0.9fr;
      gap:24px;
    }

    @media(max-width:1000px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    .card{
      padding:24px;
      border-radius:24px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:14px;
    }

    .table-wrapper{
      overflow-x:auto;
      margin-top:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      padding:16px;
      text-align:left;
      border-bottom:1px solid rgba(255,255,255,0.08);
      white-space:nowrap;
    }

    th{
      color:#cbd5e1;
      font-size:14px;
    }

    td{
      font-size:14px;
    }

    .action-btn{
      width:auto;
      padding:8px 12px;
      font-size:13px;
      margin-right:6px;
    }

    .delete-btn{
      background:linear-gradient(135deg,#dc2626,#ef4444);
    }

    .edit-btn{
      background:linear-gradient(135deg,#059669,#10b981);
    }

    .chart-box{
      height:400px;
    }

    .tag{
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      display:inline-block;
      background:#1e293b;
    }

    .footer{
      margin-top:20px;
      color:#94a3b8;
      text-align:center;
      font-size:13px;
    }
  </style>
</head>

<body>

  <!-- 登录页 -->
  <div id="loginPage" class="login-page">

    <div class="glass login-box">

      <h1>💰 财富管理系统</h1>

      <p>Cloudflare 云端理财平台</p>

      <input
        type="password"
        id="password"
        placeholder="请输入密码"
      />

      <button onclick="login()">
        登录系统
      </button>

      <div style="margin-top:18px;color:#94a3b8;font-size:13px;">
        默认密码：admin123
      </div>

    </div>

  </div>

  <!-- 主页面 -->
  <div id="mainPage" class="hidden">

    <div class="container">

      <div class="topbar">

        <h1>📊 理财资产控制台</h1>

        <button class="logout" onclick="logout()">
          退出登录
        </button>

      </div>

      <!-- 统计 -->
      <div class="stats">

        <div class="glass stat-card">
          <h3>总资产</h3>
          <p id="totalMoney">¥0</p>
        </div>

        <div class="glass stat-card">
          <h3>产品数量</h3>
          <p id="totalProducts">0</p>
        </div>

        <div class="glass stat-card">
          <h3>预估收益</h3>
          <p id="totalProfit">¥0</p>
        </div>

      </div>

      <div class="layout">

        <!-- 左边 -->
        <div>

          <!-- 添加产品 -->
          <div class="glass card">

            <h2 style="margin-bottom:20px;">
              ➕ 添加理财产品
            </h2>

            <div class="grid">

              <div>
                <label>产品名称</label>
                <input type="text" id="productName">
              </div>

              <div>
                <label>银行名称</label>
                <input type="text" id="bankName">
              </div>

              <div>
                <label>金额</label>
                <input type="number" id="amount">
              </div>

              <div>
                <label>收益率 (%)</label>
                <input type="number" id="rate">
              </div>

              <div>
                <label>购入日期</label>
                <input type="date" id="buyDate">
              </div>

              <div>
                <label>到期日期</label>
                <input type="date" id="endDate">
              </div>

            </div>

            <button onclick="saveProduct()">
              保存产品
            </button>

          </div>

          <!-- 产品列表 -->
          <div class="glass card" style="margin-top:24px;">

            <h2>
              🏦 理财产品列表
            </h2>

            <div class="table-wrapper">

              <table>

                <thead>
                  <tr>
                    <th>产品</th>
                    <th>银行</th>
                    <th>金额</th>
                    <th>收益率</th>
                    <th>购入时间</th>
                    <th>到期时间</th>
                    <th>状态</th>
                    <th>操作</th>
                  </tr>
                </thead>

                <tbody id="tbody"></tbody>

              </table>

            </div>

          </div>

        </div>

        <!-- 右边 -->
        <div>

          <div class="glass card chart-box">

            <h2 style="margin-bottom:20px;">
              📈 资产分布图
            </h2>

            <canvas id="chart"></canvas>

          </div>

        </div>

      </div>

      <div class="footer">
        Cloudflare Pages · 云端数据库版
      </div>

    </div>

  </div>

<script>

const API =
"https://finance-api.lok2u2.workers.dev";

const SYSTEM_PASSWORD = "admin123";

let products = [];

let chart;

// 登录
function login(){

  const pass =
    document.getElementById("password").value;

  if(pass === SYSTEM_PASSWORD){

    sessionStorage.setItem("finance_login","true");

    document.getElementById("loginPage")
      .classList.add("hidden");

    document.getElementById("mainPage")
      .classList.remove("hidden");

    loadProducts();

  }else{

    alert("密码错误");

  }

}

// 自动登录
if(sessionStorage.getItem("finance_login")==="true"){

  document.addEventListener("DOMContentLoaded",()=>{

    document.getElementById("loginPage")
      .classList.add("hidden");

    document.getElementById("mainPage")
      .classList.remove("hidden");

    loadProducts();

  });

}

// 退出
function logout(){

  sessionStorage.removeItem("finance_login");

  location.reload();

}

// 保存产品
async function saveProduct(){

  const item = {

    product_name:
      document.getElementById("productName").value,

    bank_name:
      document.getElementById("bankName").value,

    amount:
      Number(document.getElementById("amount").value),

    rate:
      Number(document.getElementById("rate").value),

    buy_date:
      document.getElementById("buyDate").value,

    end_date:
      document.getElementById("endDate").value

  };

  if(!item.product_name || !item.bank_name){

    alert("请填写完整信息");

    return;

  }

  await fetch(API + "/add-product",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify(item)

  });

  clearForm();

  loadProducts();

}

// 加载产品
async function loadProducts(){

  const res =
    await fetch(API + "/products");

  products = await res.json();

  render();

}

// 渲染页面
function render(){

  const tbody =
    document.getElementById("tbody");

  tbody.innerHTML = "";

  let total = 0;

  let totalProfit = 0;

  products.forEach((item)=>{

    total += item.amount;

    const profit =
      item.amount * item.rate / 100;

    totalProfit += profit;

    const today = new Date();

    const end =
      new Date(item.end_date);

    const expired =
      end < today;

    tbody.innerHTML += `

      <tr>

        <td>${item.product_name}</td>

        <td>${item.bank_name}</td>

        <td>¥${item.amount.toLocaleString()}</td>

        <td>${item.rate}%</td>

        <td>${item.buy_date}</td>

        <td>${item.end_date}</td>

        <td>
          <span class="tag">
            ${expired ? "已到期" : "持有中"}
          </span>
        </td>

        <td>

          <button
            class="action-btn delete-btn"
            onclick="deleteProduct(${item.id})">
            删除
          </button>

        </td>

      </tr>

    `;

  });

  document.getElementById("totalMoney")
    .innerText =
      "¥" + total.toLocaleString();

  document.getElementById("totalProducts")
    .innerText =
      products.length;

  document.getElementById("totalProfit")
    .innerText =
      "¥" + totalProfit.toLocaleString();

  renderChart();

}

// 删除
async function deleteProduct(id){

  if(confirm("确认删除？")){

    await fetch(API + "/delete-product",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({id})

    });

    loadProducts();

  }

}

// 图表
function renderChart(){

  const ctx =
    document.getElementById("chart");

  const labels =
    products.map(i=>i.bank_name);

  const data =
    products.map(i=>i.amount);

  if(chart){

    chart.destroy();

  }

  chart = new Chart(ctx,{

    type:"doughnut",

    data:{
      labels,
      datasets:[{
        data
      }]
    },

    options:{
      responsive:true,
      plugins:{
        legend:{
          labels:{
            color:"white"
          }
        }
      }
    }

  });

}

// 清空
function clearForm(){

  document.getElementById("productName").value="";
  document.getElementById("bankName").value="";
  document.getElementById("amount").value="";
  document.getElementById("rate").value="";
  document.getElementById("buyDate").value="";
  document.getElementById("endDate").value="";

}

</script>

</body>
</html>
